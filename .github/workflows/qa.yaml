name: QA

on:
  pull_request:

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: cargo test
        run: cargo test --workspace

  features:
    name: Feature matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: cargo build (default features)
        run: cargo build
      - name: cargo build --all-features
        run: cargo build --all-features
      - name: cargo build --no-default-features
        run: cargo build -p tinkr_framework --no-default-features
      - name: cargo doc (intra-doc links)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc -p tinkr_framework --all-features --no-deps

  proto:
    name: Proto (buf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: buf lint
        working-directory: crates/demo
        run: buf lint
      - name: Generated code is up to date
        working-directory: crates/demo
        run: |
          buf generate
          git diff --exit-code

  publish-dry:
    name: Publish (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: cargo publish --dry-run
        run: cargo publish -p tinkr_framework --dry-run
