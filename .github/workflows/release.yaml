name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['crates/tinkr_framework--release_created'] }}
      tag_name: ${{ steps.release.outputs['crates/tinkr_framework--tag_name'] }}
    steps:
      - name: Generate bot token
        id: bot-token
        uses: bakakaba/actions/bot@v1
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json
          token: ${{ steps.bot-token.outputs.token }}

  publish:
    name: Publish to crates.io
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: ./.github/actions/setup
      - name: cargo publish
        # Publishes tinkr_config_macros, tinkr_config, and tinkr_framework in
        # dependency order; `demo` (publish = false) is skipped.
        run: cargo publish --workspace --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
